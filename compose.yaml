services:
  mysql:
    image: mysql:9.6
    ports:
      - published: 3306
        target: 3306
    volumes:
      - type: volume
        source: mysql_data
        target: /var/lib/mysql
    environment:
      MYSQL_DATABASE: affable
      MYSQL_ROOT_PASSWORD: root

  beanstalk:
    image: ghcr.io/beanstalkd/beanstalkd:latest
    ports:
      - published: 11300
        target: 11300
    command: ["-b", "/var/lib/beanstalkd"]
    volumes:
      - type: volume
        source: beanstalkd_data
        target: /var/lib/beanstalkd

  # laravel:
