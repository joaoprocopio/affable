services:
  nginx:
    image: nginx:1.29
    volumes:
      - ./apps/core/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - published: 80
        target: 80
    depends_on:
      - laravel
      - reactrouter
    restart: unless-stopped

  mysql:
    image: mysql:9.6
    ports:
      - published: 3306
        target: 3306
    volumes:
      - type: volume
        source: mysql_data
        target: /var/lib/mysql
    env_file:
      - path: .env
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p $$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  beanstalk:
    image: ghcr.io/beanstalkd/beanstalkd:latest
    ports:
      - published: 11300
        target: 11300
    command: "-b /var/lib/beanstalkd"
    volumes:
      - type: volume
        source: beanstalkd_data
        target: /var/lib/beanstalkd
    restart: unless-stopped

  laravel:
    build:
      context: ./apps/core
      dockerfile: dockerfile.server
    command: sh -c "php artisan migrate --force && php-fpm"
    env_file:
      - path: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  reactrouter:
    build:
      context: ./apps/app
      dockerfile: dockerfile
    command: sh -c "env | grep '^VITE_' > .env && pnpm build && pnpm start"
    env_file:
      - path: .env
    restart: unless-stopped

volumes:
  mysql_data:
  beanstalkd_data:
  laravel_data:
