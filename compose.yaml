services:
  mysql:
    image: mysql:9.6
    ports:
      - published: 3306
        target: 3306
    volumes:
      - type: volume
        source: mysql_data
        target: /var/lib/mysql
    environment:
      MYSQL_DATABASE: affable
      MYSQL_ROOT_PASSWORD: root

