apiVersion: apps/v1
kind: Deployment
metadata:
  name: affable-core
  namespace: affable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affable-core
  template:
    metadata:
      labels:
        app: affable-core
      namespace: affable
    spec:
      containers:
        - name: affable-core
          image: nginxdemos/nginx-hello:plain-text
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
